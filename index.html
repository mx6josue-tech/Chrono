<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Chrono">
  <meta name="theme-color" content="#000000">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data: blob:; media-src 'self'; font-src 'self'">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Chrono</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Main app — brightness filter applied here so modal stays bright -->
  <div id="app">
    <div id="stopwatch-container">
      <!-- FIX: aria-live="polite" + aria-atomic para screen readers -->
      <div id="time-display" role="timer" aria-live="polite" aria-atomic="true">00:00</div>
    </div>

    <div id="floating-buttons">
      <button id="btn-settings" class="fab" aria-label="Configuración">⚙️</button>
      <button id="btn-playpause" class="fab" aria-label="Iniciar">
        <span id="playpause-icon">▶</span>
      </button>
    </div>
  </div>

  <!-- Settings modal — outside #app, unaffected by brightness filter -->
  <div id="settings-modal" role="dialog" aria-modal="true" aria-label="Configuración" aria-hidden="true">
    <div class="modal-content">

      <div class="modal-header">
        <h2>Configuración</h2>
      </div>

      <div class="setting-row">
        <span class="setting-label">Color</span>
        <div class="color-picker-row">
          <div id="color-swatches">
            <button class="swatch" data-color="#00ffff" aria-label="Cian"></button>
            <button class="swatch" data-color="#ff00ff" aria-label="Magenta"></button>
            <button class="swatch" data-color="#00ff88" aria-label="Verde neón"></button>
            <button class="swatch" data-color="#ffff00" aria-label="Amarillo"></button>
            <button class="swatch" data-color="#ff6600" aria-label="Naranja"></button>
            <button class="swatch" data-color="#ff0066" aria-label="Rosa"></button>
          </div>
          <label class="custom-color-wrap" title="Color personalizado">
            <span class="plus-icon">✚</span>
            <input type="color" id="custom-color-input" value="#00ffff">
          </label>
        </div>
      </div>

      <div class="setting-row">
        <span class="setting-label">Brillo <span id="brightness-label">100</span>%</span>
        <input type="range" id="brightness-slider" min="10" max="100" value="100" step="5">
      </div>

      <div class="setting-row">
        <span class="setting-label">Tamaño <span id="fontsize-label">100</span>%</span>
        <input type="range" id="fontsize-slider" min="50" max="200" value="100" step="10">
      </div>

      <div class="setting-row">
        <span class="setting-label">Fondo</span>
        <label class="upload-btn" title="Subir imagen de fondo">
          <input type="file" id="bg-upload" accept="image/jpeg,image/png,image/webp,image/gif" hidden>
          📸 Subir imagen
        </label>
        <button id="btn-clear-bg" class="action-btn clear-bg-btn">✕ Limpiar fondo</button>
      </div>

      <div class="modal-actions">
        <button id="btn-reset" class="action-btn danger">↺ Reiniciar</button>
        <button id="btn-close" class="action-btn">Cerrar</button>
      </div>

    </div>
  </div>

  <!-- Portrait orientation warning -->
  <div id="portrait-warning">
    <div class="portrait-content">
      <div class="rotate-icon">⟳</div>
      <p>Rota tu iPad</p>
      <p class="sub">Esta app requiere modo horizontal</p>
    </div>
  </div>

  <!-- Toast notification -->
  <div id="toast" role="status" aria-live="polite"></div>

  <script src="app.js"></script>
</body>
</html>
